# Netlify site: user.rapido.neighshopglobal.com
# Base directory in UI: new-version/frontend/rider

[build]
  command = "npm ci --prefix .. && npm run build:rider --prefix .."
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
